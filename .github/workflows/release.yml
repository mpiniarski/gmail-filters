name: Update Release Asset

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  upload-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload to release
        run: |
          mapfile -t assets < <(git ls-files public/)
          gh release upload v1.0.0 "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

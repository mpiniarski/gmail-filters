# Publishes tracked public/* to GitHub Release v$RELEASE_VERSION (see RELEASE_VERSION in repo root).

name: Publish public XML

on:
  push:
    branches: [main]
    paths: [public/**, RELEASE_VERSION]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          raw=$(tr -d ' \t\r\n' < RELEASE_VERSION)
          tag=$raw
          [[ "$tag" == v* ]] || tag="v$tag"
          mapfile -t assets < <(git ls-files public/)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No tracked files under public/"
            exit 1
          fi
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" "${assets[@]}" --clobber
